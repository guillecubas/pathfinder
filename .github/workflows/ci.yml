name: CI Pipeline

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  archetype:
    runs-on: ubuntu-22.04

    outputs:
      group: ${{ steps.maven-coordinates.outputs.group }}
      artifact: ${{ steps.maven-coordinates.outputs.artifact }}
      version: ${{ steps.maven-coordinates.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Verify pom.xml exists
        run: |
          if [ -f pom.xml ]; then
            echo "pom.xml found"
          else
            echo "Error: pom.xml not found."
            exit 1
          fi

      - name: Extract Maven coordinates
        id: maven-coordinates
        run: |
          GROUP=$(mvn help:evaluate -Dexpression=project.groupId -q -DforceStdout)
          ARTIFACT=$(mvn help:evaluate -Dexpression=project.artifactId -q -DforceStdout)
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "group=${GROUP}" >> $GITHUB_OUTPUT
          echo "artifact=${ARTIFACT}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Group: ${GROUP}"
          echo "Artifact: ${ARTIFACT}"
          echo "Version: ${VERSION}"

  build:
    runs-on: ubuntu-22.04
    needs: archetype

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-dependencies-${{ needs.archetype.outputs.artifact }}-${{ needs.archetype.outputs.version }}

      - name: Build and test with Maven
        run: mvn clean compile test package verify

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: jar-artifact
          path: target/*.jar

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco

  coverage-check:
    runs-on: ubuntu-22.04
    needs: build

    steps:
      - name: Download JaCoCo report
        uses: actions/download-artifact@v4
        with:
          name: jacoco-report
          path: reports

      - name: Check coverage threshold
        run: |
          THRESHOLD=80

          if [ ! -f reports/jacoco.xml ]; then
            echo "Error: jacoco.xml not found."
            exit 1
          fi

          COVERAGE=$(grep -Po '<counter type="LINE" missed="\K[0-9]+' reports/jacoco.xml | head -1)
          MISSED=$(grep -Po '<counter type="LINE" missed="\K[0-9]+' reports/jacoco.xml | tail -1)
          COVERED=$(grep -Po '<counter type="LINE" missed="[0-9]+" covered="\K[0-9]+' reports/jacoco.xml | tail -1)

          TOTAL=$((MISSED + COVERED))
          PERCENT=$(awk "BEGIN {print (${COVERED}/${TOTAL})*100}")

          echo "Line coverage: ${PERCENT}%"

          if (( $(echo "$PERCENT < $THRESHOLD" | bc -l) )); then
            echo "Coverage below threshold: ${PERCENT}%"
            exit 1
          fi

          echo "Coverage meets the threshold: ${PERCENT}%"