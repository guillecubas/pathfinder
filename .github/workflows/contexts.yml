name: GitHub Actions Contexts

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      environment:
        description: "Entorno de ejecución"
        required: true
        default: "desarrollo"

env:
  GLOBAL_MESSAGE: "Variable global del workflow"

jobs:
  context-info:
    runs-on: ubuntu-latest

    outputs:
      repo-name: ${{ steps.repo-info.outputs.repository }}
      run-number: ${{ steps.repo-info.outputs.run_number }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Mostrar contexto github
        id: repo-info
        run: |
          echo "Repositorio: ${{ github.repository }}"
          echo "Evento: ${{ github.event_name }}"
          echo "Actor: ${{ github.actor }}"
          echo "Rama o referencia: ${{ github.ref }}"
          echo "SHA del commit: ${{ github.sha }}"
          echo "Workflow: ${{ github.workflow }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Run number: ${{ github.run_number }}"
          echo "repository=${{ github.repository }}" >> $GITHUB_OUTPUT
          echo "run_number=${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Mostrar variable env
        run: |
          echo "Mensaje global: ${{ env.GLOBAL_MESSAGE }}"

      - name: Mostrar información del runner
        run: |
          echo "Sistema operativo: ${{ runner.os }}"
          echo "Arquitectura: ${{ runner.arch }}"
          echo "Directorio temporal: ${{ runner.temp }}"
          echo "Tool cache: ${{ runner.tool_cache }}"

      - name: Crear archivo temporal
        run: |
          echo "Archivo generado en el job context-info" > resultado.txt

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: resultado-contexto
          path: resultado.txt

  use-needs:
    runs-on: ubuntu-latest
    needs: context-info

    steps:
      - name: Usar outputs del job anterior
        run: |
          echo "Repositorio recibido: ${{ needs.context-info.outputs.repo-name }}"
          echo "Número de ejecución recibido: ${{ needs.context-info.outputs.run-number }}"

      - name: Descargar artefacto
        uses: actions/download-artifact@v4
        with:
          name: resultado-contexto
          path: descargado

      - name: Mostrar artefacto descargado
        run: |
          cat descargado/resultado.txt

  matrix-example:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        java-version: [17, 21]

    steps:
      - name: Mostrar matriz
        run: |
          echo "Sistema operativo: ${{ matrix.os }}"
          echo "Versión de Java: ${{ matrix.java-version }}"

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: "temurin"

      - name: Mostrar versión de Java
        run: java -version

  manual-input:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Mostrar input manual
        run: |
          echo "Entorno elegido: ${{ inputs.environment }}"